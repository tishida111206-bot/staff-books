<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StaffBook</title>
<style>
  :root { --ink:#241b14; --sub:#725f4e; --paper:#fbf4e8; --line:#ded0bd; --green:#1f6460; --gold:#c59755; --dark:#2b211b; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; color:var(--ink); font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#eadcc8; }
  .screen { min-height:100vh; }
  .intro { position:fixed; inset:0; z-index:20; display:grid; place-items:center; background:#130d09; overflow:hidden; transition:opacity .38s ease, visibility .38s ease; }
  .intro.done { opacity:0; visibility:hidden; pointer-events:none; }
  .introVideo { width:100%; height:100%; object-fit:cover; background:#130d09; }
  .skipIntro { position:absolute; right:16px; bottom:16px; min-height:42px; border:1px solid rgba(255,255,255,.35); border-radius:999px; padding:0 14px; background:rgba(31,22,16,.42); color:white; font-weight:700; cursor:pointer; }
  @media (prefers-reduced-motion: reduce) { .intro { display:none; } }
  .home { display:flex; flex-direction:column; }
  .homeHead { position:sticky; top:0; z-index:2; background:rgba(251,244,232,.96); border-bottom:1px solid var(--line); padding:20px clamp(16px, 4vw, 42px) 16px; display:grid; gap:14px; backdrop-filter:blur(8px); }
  .titleRow { display:flex; justify-content:space-between; align-items:flex-end; gap:16px; }
  h1 { margin:0; font-family:Georgia, "Times New Roman", serif; font-size:clamp(32px, 6vw, 58px); line-height:1; letter-spacing:0; }
  .count { color:var(--sub); font-size:14px; white-space:nowrap; }
  .controls { display:grid; gap:10px; }
  input { width:100%; border:1px solid var(--line); border-radius:10px; padding:15px 15px; font-size:17px; background:white; }
  .groups { display:flex; gap:8px; overflow:auto; padding-bottom:2px; }
  .chip { flex:0 0 auto; border:1px solid var(--line); background:#fff7ec; color:var(--ink); border-radius:999px; padding:11px 14px; font-size:14px; cursor:pointer; min-height:42px; }
  .chip.active { background:var(--green); border-color:var(--green); color:white; }
  .nameGrid { padding:24px clamp(14px, 4vw, 42px) 46px; display:grid; grid-template-columns:repeat(auto-fill, minmax(178px, 1fr)); gap:16px; align-content:start; }
  .nameButton { position:relative; min-height:76px; border:1px solid #9b7045; border-radius:8px; background:linear-gradient(145deg, #fff8df 0%, #ead1a6 100%); color:#2c1c12; font-family:Georgia, "Times New Roman", serif; font-size:20px; font-weight:700; letter-spacing:0; cursor:pointer; box-shadow:0 5px 0 #7b4d2d, 0 12px 20px rgba(52,34,20,.16), inset 0 1px 0 rgba(255,255,255,.82), inset 0 -10px 20px rgba(112,68,31,.08); text-shadow:0 1px 0 rgba(255,255,255,.65); transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease, filter .14s ease; touch-action:manipulation; overflow:hidden; }
  .nameButton::before { content:""; position:absolute; inset:7px; border:1px solid rgba(119,72,34,.36); border-radius:6px; pointer-events:none; }
  .nameButton::after { content:""; position:absolute; width:8px; height:8px; left:12px; top:12px; border-radius:999px; background:rgba(124,75,36,.34); box-shadow:calc(100% + 132px) 0 0 rgba(124,75,36,.26), 0 40px 0 rgba(124,75,36,.22), calc(100% + 132px) 40px 0 rgba(124,75,36,.18); pointer-events:none; opacity:.5; }
  .nameButton:hover { border-color:#7d4e2e; filter:saturate(1.05); transform:translateY(-3px) rotate(-.2deg); box-shadow:0 8px 0 #704528, 0 18px 28px rgba(52,34,20,.22), inset 0 1px 0 rgba(255,255,255,.9), inset 0 -10px 20px rgba(112,68,31,.08); }
  .nameButton:active { transform:translateY(4px) scale(.985); box-shadow:0 1px 0 #704528, 0 5px 10px rgba(52,34,20,.16), inset 0 2px 8px rgba(82,44,20,.18); }
  .nameButton:focus-visible { outline:3px solid rgba(31,100,96,.34); outline-offset:3px; }
  .empty { padding:24px; color:var(--sub); }
  .profile { display:none; min-height:100vh; background:#2b241f; color:white; overflow:hidden; }
  .profile.active { display:flex; flex-direction:column; }
  .profile.entering { animation:profileBackdrop .38s ease both; }
  .profileBar { min-height:64px; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px clamp(12px, 3vw, 28px); background:#211812; border-bottom:1px solid rgba(255,255,255,.12); }
  .profile.entering .profileBar { animation:barDrop .34s ease both; }
  .back { border:1px solid rgba(255,255,255,.25); background:rgba(255,255,255,.12); color:white; border-radius:8px; min-height:42px; padding:0 14px; font-size:15px; font-weight:750; cursor:pointer; }
  .selected { min-width:0; display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; justify-content:flex-end; text-align:right; }
  .selected strong { font-size:22px; }
  .selected span { color:#d8c7b2; font-size:13px; }
  .imageWrap { flex:1; display:grid; place-items:center; padding:clamp(8px, 2vw, 22px); overflow:auto; position:relative; }
  .imageWrap::before { content:""; position:absolute; inset:0; background:radial-gradient(circle at 50% 50%, rgba(255,238,193,.26), transparent 34%); opacity:0; pointer-events:none; }
  .profile.entering .imageWrap::before { animation:impactFlash .46s ease both; }
  .profileImage { max-width:100%; max-height:calc(100vh - 92px); width:auto; height:auto; object-fit:contain; box-shadow:0 18px 60px rgba(0,0,0,.35); background:#eee; transform-origin:center; }
  .profile.entering .profileImage { animation:profileBang .46s cubic-bezier(.16,1.08,.28,1) both; }
  @keyframes profileBackdrop { from { background:#140d09; } to { background:#2b241f; } }
  @keyframes barDrop { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
  @keyframes impactFlash { 0% { opacity:0; transform:scale(.72); } 24% { opacity:1; transform:scale(1); } 100% { opacity:0; transform:scale(1.55); } }
  @keyframes profileBang { 0% { opacity:0; transform:scale(.72) rotate(-1.4deg); filter:brightness(1.18); } 55% { opacity:1; transform:scale(1.045) rotate(.45deg); filter:brightness(1.04); } 78% { transform:scale(.985) rotate(-.18deg); } 100% { opacity:1; transform:scale(1) rotate(0); filter:brightness(1); } }
  @media (max-width:560px) { .homeHead { padding:16px 14px 12px; } .groups { gap:7px; } .chip { padding:10px 13px; min-height:40px; } .nameGrid { grid-template-columns:repeat(2, minmax(0, 1fr)); gap:10px; padding:16px 12px 30px; } .nameButton { font-size:18px; min-height:72px; padding:8px 10px; } .nameButton::after { box-shadow:calc(100% + 104px) 0 0 rgba(124,75,36,.22), 0 36px 0 rgba(124,75,36,.18), calc(100% + 104px) 36px 0 rgba(124,75,36,.14); } .profileBar { align-items:flex-start; flex-direction:column; } .selected { text-align:left; justify-content:flex-start; } .profileImage { max-height:none; } }
</style>

<body>
<div class="intro" id="intro" aria-label="StaffBook opening">
  <video class="introVideo" id="introVideo" src="staffbook-opening.mp4" autoplay muted playsinline preload="auto"></video>
  <button class="skipIntro" id="skipIntro" type="button">Skip</button>
</div>
<section class="screen home" id="home">
  <header class="homeHead">
    <div class="titleRow"><h1>StaffBook</h1><div class="count" id="count"></div></div>
    <div class="controls">
      <input id="filter" type="search" placeholder="名前で絞り込み" autocomplete="off">
      <div class="groups" id="groups"></div>
    </div>
  </header>
  <main class="nameGrid" id="names"></main>
</section>
<section class="screen profile" id="profile">
  <div class="profileBar">
    <button class="back" id="back" type="button">一覧に戻る</button>
    <div class="selected"><strong id="selectedName"></strong><span id="selectedGroup"></span></div>
  </div>
  <div class="imageWrap"><img class="profileImage" id="profileImage" alt=""></div>
</section>
<script>
const introEl = document.getElementById('intro');
const introVideoEl = document.getElementById('introVideo');
const skipIntroEl = document.getElementById('skipIntro');
function closeIntro() { if (introEl) introEl.classList.add('done'); }
if (skipIntroEl) skipIntroEl.addEventListener('click', closeIntro);
if (introVideoEl) {
  introVideoEl.addEventListener('ended', closeIntro);
  introVideoEl.addEventListener('error', closeIntro);
  window.addEventListener('load', () => {
    const playPromise = introVideoEl.play();
    if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => setTimeout(closeIntro, 1800));
    setTimeout(closeIntro, 7000);
  });

const home = document.getElementById('home');
const profile = document.getElementById('profile');
const namesEl = document.getElementById('names');
const groupsEl = document.getElementById('groups');
const filterEl = document.getElementById('filter');
const countEl = document.getElementById('count');
const selectedNameEl = document.getElementById('selectedName');
const selectedGroupEl = document.getElementById('selectedGroup');
const profileImageEl = document.getElementById('profileImage');
let activeGroup = 'すべて';
const groups = ['すべて', ...Array.from(new Set(members.map(m => m.group)))];
const compact = s => (s || '').normalize('NFKC').replace(/s+/g, '').toLowerCase();
function routeHome() { history.pushState(null, '', location.pathname); showHome(); }
function showHome() { home.style.display = 'flex'; profile.classList.remove('active'); document.title = 'StaffBook'; }
function showProfile(member, push = true) {
  selectedNameEl.textContent = member.name;
  selectedGroupEl.textContent = member.group;
  profileImageEl.src = member.image;
  profileImageEl.alt = member.name + 'のプロフィール';
  home.style.display = 'none';
  profile.classList.add('active');
  profile.classList.remove('entering');
  void profile.offsetWidth;
  profile.classList.add('entering');
  window.setTimeout(() => profile.classList.remove('entering'), 560);
  document.title = member.name + ' - StaffBook';
  if (push) history.pushState({ name: member.name }, '', '#name=' + encodeURIComponent(member.name));
}
function renderGroups() {
  groupsEl.innerHTML = '';
  for (const group of groups) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'chip' + (group === activeGroup ? ' active' : '');
    button.textContent = group;
    button.addEventListener('click', () => { activeGroup = group; renderGroups(); renderNames(); });
    groupsEl.appendChild(button);
  }
}
function visibleMembers() {
  const q = compact(filterEl.value);
  return members.filter(m => (activeGroup === 'すべて' || m.group === activeGroup) && (!q || compact(m.name).includes(q) || compact(m.group).includes(q)));
}
function renderNames() {
  const shown = visibleMembers();
  countEl.textContent = shown.length + '人';
  namesEl.innerHTML = '';
  if (!shown.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '該当する名前がありません';
    namesEl.appendChild(empty);
    return;
  }
  for (const member of shown) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'nameButton';
    button.textContent = member.name;
    button.addEventListener('click', () => showProfile(member));
    namesEl.appendChild(button);
  }
}
function applyHash() {
  const match = location.hash.match(/^#name=(.*)$/);
  if (!match) { showHome(); return; }
  const name = decodeURIComponent(match[1]);
  const member = members.find(m => m.name === name);
  if (member) showProfile(member, false); else showHome();
}
document.getElementById('back').addEventListener('click', routeHome);
filterEl.addEventListener('input', renderNames);
window.addEventListener('popstate', applyHash);
renderGroups();
renderNames();
applyHash();
</script>
